<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectrum Analyzer · SPC-7A</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #00ff9f; --cyan: #00e5ff; --red: #ff6e6e;
    --bg: #050a0e; --panel: #0a1a20; --border: #1a3040;
  }
  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    color: #a0b4c0; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 14px 36px; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,159,0.008) 2px, rgba(0,255,159,0.008) 3px);
  }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.55) 100%);
  }
  .wrap { width: 100%; max-width: 880px; position: relative; z-index: 1; }

  .header { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
  .led { width: 8px; height: 8px; border-radius: 50%; background: #1a3040; transition: background .3s, box-shadow .3s; }
  .led.on { background: var(--green); box-shadow: 0 0 12px var(--green); animation: blink 1.2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
  h1 { font-family: 'Orbitron', monospace; font-size: 16px; font-weight: 900; letter-spacing: 7px; color: #c8e6f0; }
  .model-tag { margin-left: auto; font-size: 9px; letter-spacing: 2px; color: #1a3040; }
  .divider { height: 1px; background: linear-gradient(90deg, var(--green), rgba(0,255,159,.1), transparent); margin-bottom: 16px; }

  .panel {
    background: linear-gradient(160deg, var(--panel) 0%, #060e14 100%);
    border: 1px solid var(--border); border-radius: 3px;
    position: relative; overflow: hidden;
    box-shadow: 0 0 40px rgba(0,255,159,.03), inset 0 1px 0 rgba(255,255,255,.04);
  }
  .panel::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,255,159,.015) 3px, rgba(0,255,159,.015) 4px);
  }

  /* Meters */
  .meters { display: flex; gap: 14px; margin-bottom: 14px; }
  .meter { flex: 1; padding: 16px 20px; }
  .meter-label { font-size: 8px; letter-spacing: 4px; color: #1a3040; margin-bottom: 7px; }
  .meter-value { font-family: 'Orbitron', monospace; font-size: 42px; font-weight: 900; line-height: 1; letter-spacing: 1px; }
  .meter-unit { font-size: 9px; letter-spacing: 3px; margin-top: 3px; opacity: .4; }
  .meter-note { font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 700; letter-spacing: 2px; margin-top: 8px; min-height: 24px; }
  .bar-track { height: 2px; border-radius: 2px; margin-top: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; width: 0%; transition: width .08s; }

  #freq-val { color: var(--green); text-shadow: 0 0 22px rgba(0,255,159,.5); }
  #freq-note { color: var(--cyan); text-shadow: 0 0 12px rgba(0,229,255,.4); }
  .freq-track { background: #0a1a20; }
  .freq-fill { background: var(--green); box-shadow: 0 0 8px var(--green); }

  #db-val { color: var(--red); text-shadow: 0 0 22px rgba(255,110,110,.5); }
  .db-track { background: #1a0a0a; }
  .db-fill { background: var(--red); box-shadow: 0 0 8px var(--red); }

  /* History chart */
  .hist-panel { margin-bottom: 14px; padding: 14px; }
  .hist-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .panel-title { font-size: 8px; letter-spacing: 4px; color: #1a3040; text-transform: uppercase; }
  .legend { display: flex; gap: 18px; font-size: 8px; letter-spacing: 2px; }
  canvas { display: block; width: 100%; }

  /* Controls */
  .controls { display: flex; justify-content: center; gap: 14px; margin-top: 6px; }
  .btn {
    background: transparent; font-family: 'Orbitron', monospace;
    font-size: 11px; font-weight: 700; letter-spacing: 4px;
    padding: 12px 36px; cursor: pointer; text-transform: uppercase;
    border-radius: 2px; transition: all .2s;
  }
  .btn-start { border: 1px solid var(--green); color: var(--green); box-shadow: 0 0 14px rgba(0,255,159,.15); }
  .btn-start:hover { background: rgba(0,255,159,.07); box-shadow: 0 0 28px rgba(0,255,159,.35); }
  .btn-stop { border: 1px solid var(--red); color: var(--red); box-shadow: 0 0 14px rgba(255,110,110,.15); }
  .btn-stop:hover { background: rgba(255,110,110,.07); box-shadow: 0 0 28px rgba(255,110,110,.35); }

  .error-msg { color: var(--red); font-size: 10px; letter-spacing: 1px; text-align: center; margin-top: 14px; display: none; line-height: 1.6; }
  .footer { text-align: center; font-size: 8px; letter-spacing: 2px; color: #0d1e28; margin-top: 18px; }
  #status-txt { transition: color .3s; }
  #status-txt.on { color: var(--green); }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="led" id="led"></div>
    <h1>SPECTRUM ANALYZER</h1>
    <span class="model-tag">SPC-7A · WEB AUDIO API</span>
  </div>
  <div class="divider"></div>

  <!-- Meters -->
  <div class="meters">
    <div class="panel meter">
      <div class="meter-label">FREQUENCY</div>
      <div class="meter-value" id="freq-val">────</div>
      <div class="meter-unit" style="color:#1a5040">Hz</div>
      <div class="meter-note" id="freq-note">─</div>
      <div class="bar-track freq-track"><div class="bar-fill freq-fill" id="freq-bar"></div></div>
    </div>
    <div class="panel meter">
      <div class="meter-label">LEVEL</div>
      <div class="meter-value" id="db-val">───</div>
      <div class="meter-unit" style="color:#3a1a1a">dBFS</div>
      <div class="meter-note" style="min-height:24px"></div>
      <div class="bar-track db-track"><div class="bar-fill db-fill" id="db-bar"></div></div>
    </div>
  </div>

  <!-- History chart -->
  <div class="panel hist-panel">
    <div class="hist-head">
      <div class="panel-title">HISTORY · 120 FRAMES</div>
      <div class="legend">
        <span style="color:var(--cyan)">— Hz (log)</span>
        <span style="color:var(--red)">— dBFS</span>
      </div>
    </div>
    <canvas id="hist-canvas" height="240"></canvas>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="start-btn" onclick="startAudio()">▶ START</button>
    <button class="btn btn-stop" id="stop-btn" onclick="stopAudio()" style="display:none">■ STOP</button>
  </div>
  <div class="error-msg" id="error-msg"></div>
  <div class="footer">MICROPHONE INPUT · <span id="status-txt">○ STANDBY</span></div>
</div>

<script>
const MAX_HIST = 120;
const FFT_SIZE = 4096;
let audioCtx, analyser, animId, stream;
let history = [];

const histCanvas = document.getElementById('hist-canvas');
const hCtx = histCanvas.getContext('2d');

function setCanvasSize() {
  histCanvas.width = Math.max(100, histCanvas.parentElement.clientWidth - 28);
}
setCanvasSize();
window.addEventListener('resize', () => { setCanvasSize(); drawHist(); });

function lerp(a, b, t) { return a + (b - a) * t; }

function freqColor(f) {
  if (f < 200) return '#00ff9f';
  if (f < 800) return '#00e5ff';
  if (f < 3000) return '#b388ff';
  return '#ff6e6e';
}

// ── ドレミ変換 ──
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function freqToNote(freq) {
  if (!freq || freq < 20) return '─';
  const semitones = Math.round(12 * Math.log2(freq / 440));
  const noteIndex = ((semitones % 12) + 12 + 9) % 12; // A=9
  const octave = Math.floor((semitones + 57) / 12); // C4=middle
  return NOTE_NAMES[noteIndex] + octave;
}

// ── dB: マイク入力なし時は -∞ になるよう silence 補正 ──
function calcDb(timeData) {
  let sum = 0;
  for (let i = 0; i < timeData.length; i++) {
    const s = (timeData[i] - 128) / 128;
    sum += s * s;
  }
  const rms = Math.sqrt(sum / timeData.length);
  if (rms < 1e-6) return -80; // 無音扱い
  return Math.max(-80, Math.min(0, 20 * Math.log10(rms)));
}

async function startAudio() {
  document.getElementById('error-msg').style.display = 'none';
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, video: false });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = FFT_SIZE;
    analyser.smoothingTimeConstant = 0.75;
    audioCtx.createMediaStreamSource(stream).connect(analyser);

    const bufLen = analyser.frequencyBinCount;
    const freqData = new Uint8Array(bufLen);
    const timeData = new Uint8Array(bufLen);
    let frame = 0;

    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('stop-btn').style.display = '';
    document.getElementById('led').classList.add('on');
    document.getElementById('status-txt').textContent = '● RECORDING';
    document.getElementById('status-txt').classList.add('on');

    function tick() {
      analyser.getByteFrequencyData(freqData);
      analyser.getByteTimeDomainData(timeData);

      const db = calcDb(timeData);

      // 支配的周波数（低域ノイズ除外: 80Hz以上）
      const minBin = Math.ceil(80 * FFT_SIZE / audioCtx.sampleRate);
      let maxV = 0, maxI = minBin;
      for (let i = minBin; i < bufLen; i++) {
        if (freqData[i] > maxV) { maxV = freqData[i]; maxI = i; }
      }
      const freq = maxV > 15 ? Math.round((maxI * audioCtx.sampleRate) / FFT_SIZE) : 0;

      // Meters
      const fEl = document.getElementById('freq-val');
      fEl.textContent = freq > 0 ? freq.toLocaleString() : '────';
      const fc = freqColor(freq);
      fEl.style.color = fc; fEl.style.textShadow = `0 0 22px ${fc}88`;

      document.getElementById('freq-note').textContent = freq > 0 ? freqToNote(freq) : '─';

      const fPct = freq > 0 ? Math.min(100, Math.log10(Math.max(1, freq)) / Math.log10(20000) * 100) : 0;
      const fBar = document.getElementById('freq-bar');
      fBar.style.width = fPct + '%'; fBar.style.background = fc; fBar.style.boxShadow = `0 0 8px ${fc}`;

      document.getElementById('db-val').textContent = Math.round(db);
      const dbPct = Math.max(0, (db + 80) / 80 * 100);
      document.getElementById('db-bar').style.width = dbPct + '%';

      frame++;
      if (frame % 4 === 0) {
        history.push({ freq, db });
        if (history.length > MAX_HIST) history.shift();
      }

      drawHist();
      animId = requestAnimationFrame(tick);
    }
    tick();
  } catch(e) {
    const m = document.getElementById('error-msg');
    m.textContent = 'マイクへのアクセスが拒否されました。\nブラウザのアドレスバー左のアイコンから許可してください。';
    m.style.display = 'block';
  }
}

function stopAudio() {
  if (animId) cancelAnimationFrame(animId);
  if (audioCtx) audioCtx.close();
  if (stream) stream.getTracks().forEach(t => t.stop());
  document.getElementById('start-btn').style.display = '';
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('led').classList.remove('on');
  document.getElementById('status-txt').textContent = '○ STANDBY';
  document.getElementById('status-txt').classList.remove('on');
  document.getElementById('freq-val').textContent = '────';
  document.getElementById('db-val').textContent = '───';
  document.getElementById('freq-note').textContent = '─';
  document.getElementById('freq-bar').style.width = '0%';
  document.getElementById('db-bar').style.width = '0%';
}

// ── History chart ──
function drawHist() {
  const W = histCanvas.width, H = histCanvas.height;
  hCtx.clearRect(0, 0, W, H);

  const PAD_L = 52, PAD_R = 10, PAD_T = 12, PAD_B = 28;
  const CW = W - PAD_L - PAD_R, CH = H - PAD_T - PAD_B;
  const HZ_MID = PAD_T + CH / 2; // boundary between Hz (top) and dB (bottom)

  // ── background zones ──
  hCtx.fillStyle = 'rgba(0,229,255,0.025)';
  hCtx.fillRect(PAD_L, PAD_T, CW, CH / 2 - 1);
  hCtx.fillStyle = 'rgba(255,110,110,0.025)';
  hCtx.fillRect(PAD_L, HZ_MID + 1, CW, CH / 2 - 1);

  // ── grid lines ──
  hCtx.strokeStyle = 'rgba(255,255,255,0.05)';
  hCtx.lineWidth = 1;

  // Hz grid (log: 50,100,200,500,1k,2k,5k,10k,20k)
  const HZ_TICKS = [50,100,200,500,1000,2000,5000,10000,20000];
  HZ_TICKS.forEach(hz => {
    const lf = Math.log10(hz) / Math.log10(20000);
    const y = PAD_T + (CH / 2 - 2) * (1 - lf);
    hCtx.beginPath(); hCtx.moveTo(PAD_L, y); hCtx.lineTo(PAD_L + CW, y); hCtx.stroke();
    hCtx.fillStyle = '#1a3a40'; hCtx.font = '8px Share Tech Mono';
    hCtx.textAlign = 'right';
    const label = hz >= 1000 ? (hz/1000)+'k' : hz+'';
    hCtx.fillText(label, PAD_L - 4, y + 3);
  });

  // dB grid (-80,-60,-40,-20,0)
  const DB_TICKS = [0, -20, -40, -60, -80];
  DB_TICKS.forEach(d => {
    const y = lerp(PAD_T + CH - PAD_B + PAD_T + 2, HZ_MID + 2, (d + 80) / 80);
    // recalc properly:
    const yy = HZ_MID + 2 + (CH / 2 - 4) * (1 - (d + 80) / 80);
    hCtx.beginPath(); hCtx.moveTo(PAD_L, yy); hCtx.lineTo(PAD_L + CW, yy); hCtx.stroke();
    hCtx.fillStyle = '#3a1a1a'; hCtx.font = '8px Share Tech Mono';
    hCtx.textAlign = 'right';
    hCtx.fillText(d+'', PAD_L - 4, yy + 3);
  });

  // vertical time grid
  hCtx.strokeStyle = 'rgba(255,255,255,0.04)';
  for (let i = 0; i <= 6; i++) {
    const x = PAD_L + (i / 6) * CW;
    hCtx.beginPath(); hCtx.moveTo(x, PAD_T); hCtx.lineTo(x, PAD_T + CH); hCtx.stroke();
  }

  // divider
  hCtx.strokeStyle = 'rgba(255,255,255,0.12)';
  hCtx.lineWidth = 1;
  hCtx.setLineDash([4, 4]);
  hCtx.beginPath(); hCtx.moveTo(PAD_L, HZ_MID); hCtx.lineTo(PAD_L + CW, HZ_MID); hCtx.stroke();
  hCtx.setLineDash([]);

  // axis labels
  hCtx.fillStyle = '#00e5ff'; hCtx.font = '7px Share Tech Mono'; hCtx.textAlign = 'left';
  hCtx.fillText('Hz', PAD_L + 2, PAD_T + 10);
  hCtx.fillStyle = '#ff6e6e';
  hCtx.fillText('dBFS', PAD_L + 2, HZ_MID + 14);

  // bottom time axis
  hCtx.fillStyle = '#1a3040'; hCtx.font = '8px Share Tech Mono'; hCtx.textAlign = 'center';
  hCtx.fillText('← ' + MAX_HIST + ' frames ago', PAD_L + CW * 0.25, H - 8);
  hCtx.fillText('NOW →', PAD_L + CW * 0.85, H - 8);

  if (history.length < 2) return;

  const n = history.length;
  const xOf = i => PAD_L + ((MAX_HIST - n + i) / (MAX_HIST - 1)) * CW;

  // ── Hz line ──
  hCtx.save();
  hCtx.strokeStyle = '#00e5ff'; hCtx.lineWidth = 2;
  hCtx.shadowBlur = 8; hCtx.shadowColor = '#00e5ff';
  hCtx.beginPath();
  history.forEach((p, i) => {
    const x = xOf(i);
    const lf = p.freq > 0 ? Math.log10(p.freq) / Math.log10(20000) : 0;
    const y = PAD_T + (CH / 2 - 4) * (1 - Math.min(1, lf));
    i === 0 ? hCtx.moveTo(x, y) : hCtx.lineTo(x, y);
  });
  hCtx.stroke(); hCtx.restore();

  // ── dB line ──
  hCtx.save();
  hCtx.strokeStyle = '#ff6e6e'; hCtx.lineWidth = 2;
  hCtx.shadowBlur = 8; hCtx.shadowColor = '#ff6e6e';
  hCtx.beginPath();
  history.forEach((p, i) => {
    const x = xOf(i);
    const y = HZ_MID + 2 + (CH / 2 - 4) * (1 - (p.db + 80) / 80);
    i === 0 ? hCtx.moveTo(x, y) : hCtx.lineTo(x, y);
  });
  hCtx.stroke(); hCtx.restore();
}

drawHist();
</script>
</body>
</html>
